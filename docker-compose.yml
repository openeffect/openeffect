services:
  openeffect:
    image: ghcr.io/openeffect/openeffect:nightly
    # Uncomment to build locally instead of pulling:
    # build: .
    ports:
      - "127.0.0.1:3131:3131"
    volumes:
      - ${OPENEFFECT_DATA_DIR:-~/.openeffect}:/data
    # environment:
      # fal.ai API key. Leave commented and paste it into the Settings UI
      # on first boot — the value lands in `/data/config.json` (mode 0o600,
      # owned by the container's user). That's the safer default: the key
      # stays off the compose file, out of `docker inspect`, and out of
      # every child process's environment.
      #
      # Uncomment only if the container must have the key *before* anyone
      # opens the UI — e.g. a fully automated deploy where no one will
      # touch a browser. Pair with a sibling `.env` file (not in git) that
      # defines FAL_KEY, so the literal value isn't hardcoded here either.
      # - FAL_KEY=${FAL_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:3131/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
