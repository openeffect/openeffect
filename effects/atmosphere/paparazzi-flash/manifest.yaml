manifest_version: 1

id: openeffect/paparazzi-flash
name: Paparazzi Flash
description: >
  Rapid camera flash bursts illuminate the subject like a paparazzi moment,
  creating a stylish celebrity-style photo-call effect without changing the scene.

version: "0.1.0"
author: OpenEffect
category: atmosphere

tags:
  - flash
  - celebrity
  - paparazzi
  - dramatic

showcases:
  - preview: preview.mp4
    inputs:
      image: input-image.jpg

inputs:
  image:
    type: image
    role: start_frame
    required: true
    label: "Your photo"
    hint: "Works best with portraits or fashion-style photos where the subject is clearly visible"

generation:
  models:
    - kling-3.0

  default_model: kling-3.0

  prompt: >
    A single continuous shot of the same subject from the input image.
    Brief photographic camera flashes fire intermittently from off-camera,
    creating short clean white flash reflections on the face, clothing,
    and surrounding scene.
    Preserve the same identity, face, hairstyle, clothing, pose, and background.
    The subject remains planted in the same scene.
    Only subtle natural micro-motion is allowed.
    No cut, no scene replacement, no duplicate subject.

  negative_prompt: >
    cut, scene replacement, duplicate subject, extra people, warped face,
    deformed anatomy, strong body translation, heavy jitter, blur,
    overexposure, washed out face, washed out clothing, full-frame bleaching,
    extreme glow bloom, fireworks, sparks, pyrotechnics, embers,
    exploding lights, visible flare explosion, text, watermark

  model_overrides:
    kling-3.0:
      prompt: >
        Medium close-up or medium shot of the same subject from the input image.
        Brief paparazzi camera flashes pop from off-camera in one continuous shot,
        producing short clean photographic light hits across the face, outfit,
        and background.
        No visible fireworks, no sparks, no pyrotechnic light effects.
        The same subject remains planted and recognizable throughout.
        Only subtle blink, breathing, or slight hair movement is allowed.
        Stylish celebrity photo-call energy, clean continuity, no cut,
        no scene replacement.
      params:
        duration: 4
        generate_audio: false
        guidance_scale: 0.54
