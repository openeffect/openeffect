manifest_version: 1

id: openeffect/wind-to-face
name: Wind To Face
description: >
  A gust of wind hits the subject from the front, pushing hair, fabric,
  and subtle facial details in a dramatic cinematic way while preserving identity.

version: "0.1.0"
author: OpenEffect
category: atmosphere

tags:
  - wind
  - dramatic
  - fashion
  - motion

showcases:
  - preview: preview.mp4
    inputs:
      image: input-image.jpg

inputs:
  image:
    type: image
    role: start_frame
    required: true
    label: "Your photo"
    hint: "Works best with portraits or medium shots where hair, clothing, or fabric can react to wind"

generation:
  models:
    - kling-3.0

  default_model: kling-3.0

  prompt: >
    A single continuous shot of the same subject from the input image.
    A frontal gust of wind blows toward the subject, pushing hair, loose fabric,
    and subtle clothing details backward in a natural cinematic way.
    Preserve the same identity, face, hairstyle, clothing, pose, and background.
    The subject remains planted in the same scene.
    Only subtle natural micro-motion is allowed.
    No cut, no scene replacement, no duplicate subject.

  negative_prompt: >
    cut, scene replacement, duplicate subject, extra people, warped face,
    deformed anatomy, strong body translation, walking motion, storm chaos,
    flying debris, dust explosion, hair covering entire face, extreme blur,
    heavy jitter, flicker, text, watermark

  model_overrides:
    kling-3.0:
      prompt: >
        Medium close-up or medium shot of the same subject from the input image.
        A strong gust of wind blows directly toward the subject in one continuous shot,
        pushing hair and loose fabric backward with natural force.
        The same subject remains planted and recognizable throughout.
        Only subtle blink, breathing, or slight head resistance is allowed.
        Cinematic fashion-editorial energy, realistic motion, clean continuity,
        no cut, no scene replacement.
      params:
        duration: 4
        generate_audio: false
        guidance_scale: 0.56
