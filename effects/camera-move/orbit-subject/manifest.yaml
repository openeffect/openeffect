manifest_version: 1

id: openeffect/orbit-subject
name: Orbit Subject
description: >
  A cinematic orbital camera move circles around the subject,
  creating dynamic depth, motion, and dramatic perspective.

version: "0.1.0"
author: OpenEffect
category: camera_move

tags:
  - orbit
  - parallax
  - dramatic
  - depth

showcases:
  - preview: preview.mp4
    inputs:
      image: input-image.jpg

inputs:
  image:
    type: image
    role: start_frame
    required: true
    label: "Your photo"
    hint: "Works best with a clearly separated subject and visible background depth"

generation:
  models:
    - kling-3.0
    - pixverse-v6

  default_model: pixverse-v6

  prompt: >
    A single continuous orbital camera move around the same subject from the input image.
    The camera circles smoothly around the subject while preserving the same identity,
    face, hairstyle, clothing, pose, and environment.
    The subject remains planted in place.
    Only subtle natural micro-motion is allowed.
    Background depth and parallax shift naturally during the orbit.
    No cut, no scene replacement, no duplicate subject, no walking motion.

  negative_prompt: >
    cut, scene replacement, duplicate subject, extra people, warped face,
    deformed anatomy, strong body translation, walking motion, heavy jitter,
    flicker, blur, extreme fisheye, text, watermark

  model_overrides:
    kling-3.0:
      prompt: >
        Medium shot of the same subject from the input image.
        The camera performs a smooth cinematic orbit around the subject in one unbroken shot.
        The subject remains planted and recognizable throughout the motion.
        No walking, no body translation, only slight blink, breathing,
        or subtle hair movement.
        Strong natural parallax, realistic depth, clean continuity, no cut.
      params:
        duration: 4
        generate_audio: false
        guidance_scale: 0.56

    pixverse-v6:
      prompt: >
        Cinematic orbital camera move: the camera smoothly circles around the subject
        in a continuous arc, revealing depth and parallax in the background as it travels.
        The subject stays planted in place - same identity, same face, same expression,
        same outfit, same scene - only subtle natural micro-motion (blink, breathing, slight hair movement).
        Professional camera work, smooth continuous motion, single continuous take, no cuts, no scene change.
      params:
        duration: 4
        generate_audio: false
        generate_multi_clip: false
