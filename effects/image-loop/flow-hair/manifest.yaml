id: flow-hair
name: Hair Flow
description: Hair flows and moves naturally in the wind in a seamless loop.
version: "1.0.0"
author: openeffect-team
effect_type: image_loop
category: loop
tags: [hair, wind, flowing, portrait]

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    input_1: example_input_1.jpg
    output: example_output.mp4

inputs:
  image:
    type: image
    required: true
    label: Your photo
    hint: Best with portraits where hair is clearly visible
    accept: [image/jpeg, image/png, image/webp]
    max_size_mb: 10
  prompt:
    type: text
    required: false
    label: Additional description
    placeholder: "Gentle breeze blowing..."
    max_length: 300
    multiline: false

output:
  aspect_ratios: ["1:1", "9:16"]
  default_aspect_ratio: "1:1"
  durations: [3, 5]
  default_duration: 3

generation:
  prompt_template: >
    Hair flowing and moving naturally in the wind.
    Gentle breeze creating realistic hair movement in a seamless loop.
    {prompt}
    Photorealistic, natural motion, perfectly looping.
  negative_prompt: >
    static, stiff, unnatural movement, low quality, blurry,
    distorted face, visible loop seam
  supported_models: [fal-ai/wan-2.2, local/wan-2.2]
  default_model: fal-ai/wan-2.2
  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30
  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: Higher = closer to prompt
    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: More steps = better quality but slower
    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random"
