id: breathe-portrait
name: Breathing Portrait
description: Makes your portrait gently breathe in a seamless loop.
version: "1.0.0"
author: openeffect-team
effect_type: single_image
category: animation
tags: [portrait, loop, subtle, profile-pic]

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    input_1: example_input_1.jpg
    output: example_output.mp4

inputs:
  image:
    type: image
    required: true
    label: Portrait photo
    hint: Face should be clearly visible and well-lit
    accept: [image/jpeg, image/png, image/webp]
    max_size_mb: 10
  prompt:
    type: text
    required: false
    label: Additional description
    placeholder: "In a dramatic light..."
    max_length: 300
    multiline: false

output:
  aspect_ratios: ["1:1", "9:16"]
  default_aspect_ratio: "1:1"
  durations: [3, 5]
  default_duration: 3

generation:
  prompt_template: >
    Portrait photo coming to life with subtle realistic breathing motion.
    Gentle chest and shoulder movement. {prompt}
    Photorealistic, smooth, seamless loop quality.
  negative_prompt: >
    jerky motion, distorted face, morphing features,
    shape shifting, low quality, blurry
  supported_models: [fal-ai/wan-2.2, local/wan-2.2]
  default_model: fal-ai/wan-2.2
  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30
  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: Higher = closer to prompt
    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: More steps = better quality but slower
    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random"
