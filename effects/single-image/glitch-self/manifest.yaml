id: glitch-self
name: Glitch Transform
description: Your photo distorts and glitches into a surreal digital transformation.
version: "1.0.0"
author: openeffect-team
effect_type: single_image
category: transformation
tags: [glitch, digital, surreal, trending]

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    input_1: example_input_1.jpg
    output: example_output.mp4

inputs:
  image:
    type: image
    required: true
    label: Your photo
    hint: Portraits and close-ups create the most striking glitch effects
    accept: [image/jpeg, image/png, image/webp]
    max_size_mb: 10
  prompt:
    type: text
    required: false
    label: Additional description
    placeholder: "Neon cyberpunk style..."
    max_length: 300
    multiline: false

output:
  aspect_ratios: ["9:16", "1:1", "16:9"]
  default_aspect_ratio: "9:16"
  durations: [3, 5]
  default_duration: 3

generation:
  prompt_template: >
    Photo glitches and distorts with digital artifacts, RGB splitting,
    and pixel displacement. Subject transforms through surreal glitch effects.
    {prompt}
    High quality, dramatic digital distortion.
  negative_prompt: >
    static, boring, low quality, blurry, no movement,
    subtle, gentle
  supported_models: [fal-ai/wan-2.2, fal-ai/kling-v3, local/wan-2.2]
  default_model: fal-ai/wan-2.2
  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30
  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: Higher = closer to prompt
    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: More steps = better quality but slower
    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random"
