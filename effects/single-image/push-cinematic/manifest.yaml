id: push-cinematic
name: Cinematic Push
description: Dramatic dolly push-in camera movement that adds depth and intensity to your photo.
version: "1.0.0"
author: openeffect-team
effect_type: single_image
category: camera
tags: [cinematic, dramatic, dolly, camera-move]

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    input_1: example_input_1.jpg
    output: example_output.mp4

inputs:
  image:
    type: image
    required: true
    label: Your photo
    hint: Works best with subjects that have depth in the scene
    accept: [image/jpeg, image/png, image/webp]
    max_size_mb: 10
  prompt:
    type: text
    required: false
    label: Additional description
    placeholder: "Slow and dramatic reveal..."
    max_length: 300
    multiline: false

output:
  aspect_ratios: ["9:16", "16:9", "1:1"]
  default_aspect_ratio: "9:16"
  durations: [3, 5]
  default_duration: 5

generation:
  prompt_template: >
    Dramatic cinematic dolly push-in camera movement toward the subject.
    Smooth forward motion with increasing depth of field.
    {prompt}
    Professional cinematography, steady, high quality.
  negative_prompt: >
    shaky camera, jerky motion, zoom instead of dolly,
    low quality, blurry, distorted
  supported_models: [fal-ai/wan-2.2, fal-ai/kling-v3, local/wan-2.2]
  default_model: fal-ai/wan-2.2
  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30
  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: Higher = closer to prompt
    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: More steps = better quality but slower
    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random"
