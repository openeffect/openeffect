id: zoom-from-space
name: Zoom from Space
description: >
  Camera flies in from outer space and zooms
  into your subject with cinematic depth.
version: "1.0.0"
author: openeffect-team
effect_type: single_image
category: camera
tags:
  - trending
  - tiktok
  - cinematic
  - viral

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    input_1: example_input_1.jpg
    output: example_output.mp4

inputs:
  image:
    type: image
    required: true
    label: "Your photo"
    hint: "Works best with portraits or landscape shots"
    accept:
      - image/jpeg
      - image/png
      - image/webp
    max_size_mb: 10

  prompt:
    type: text
    required: false
    label: "Describe the scene (optional)"
    placeholder: "A person standing on a mountain peak..."
    max_length: 500
    multiline: false

output:
  aspect_ratios:
    - "9:16"
    - "1:1"
    - "16:9"
  default_aspect_ratio: "9:16"
  durations: [3, 5]
  default_duration: 5

generation:
  prompt_template: >
    Cinematic drone shot starting from outer space,
    rapidly zooming into Earth and then into the subject.
    {prompt}
    Epic, dramatic, high quality, 4K resolution.

  negative_prompt: >
    low quality, blurry, static camera, shaky,
    distorted, watermark, text overlay

  supported_models:
    - fal-ai/wan-2.2
    - fal-ai/kling-v3
    - local/wan-2.2
  default_model: fal-ai/wan-2.2

  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30

  model_overrides:
    fal-ai/kling-v3:
      prompt_template: >
        Epic space-to-earth zoom, starting from stars
        and rushing into the subject. {prompt}
        Cinematic quality, smooth motion.
      parameters:
        guidance_scale: 8.0
    local/wan-2.2:
      parameters:
        num_inference_steps: 25

  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: "Higher = closer to prompt. Lower = more creative."

    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: "More steps = better quality but slower generation."

    - key: negative_prompt
      label: Negative prompt
      type: text
      multiline: true
      default: "low quality, blurry, static camera, shaky"
      hint: "Describe what you want to avoid in the result."

    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random. Set a fixed number to reproduce the same result."
