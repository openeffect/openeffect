id: generate-cinematic
name: Cinematic Scene
description: Generate a full cinematic video clip from your imagination.
version: "1.0.0"
author: openeffect-team
effect_type: text_to_video
category: generative
tags: [text-only, creative, cinematic]

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    output: example_output.mp4

inputs:
  prompt:
    type: text
    required: true
    label: Describe your scene
    placeholder: >
      A lone astronaut walks on Mars at sunset,
      cinematic wide shot, dramatic lighting...
    hint: Be specific about lighting, camera movement, and mood.
    max_length: 600
    multiline: true
  camera_movement:
    type: select
    required: false
    label: Camera movement
    default: static
    options:
      - value: static
        label: Static
      - value: pan
        label: Pan
      - value: zoom-in
        label: Zoom in
      - value: zoom-out
        label: Zoom out
      - value: orbit
        label: Orbit

output:
  aspect_ratios: ["16:9", "9:16", "1:1"]
  default_aspect_ratio: "16:9"
  durations: [3, 5, 10]
  default_duration: 5

generation:
  prompt_template: >
    {prompt}
    {camera_movement} camera movement.
    Cinematic lighting, professional cinematography, 4K.
  negative_prompt: >
    amateur, shaky camera, low quality,
    watermark, text overlay, blurry
  supported_models: [fal-ai/wan-2.2, fal-ai/kling-v3]
  default_model: fal-ai/wan-2.2
  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30
  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: Higher = closer to prompt
    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: More steps = better quality but slower
    - key: negative_prompt
      label: Negative prompt
      type: text
      multiline: true
      default: "amateur, shaky camera, low quality"
      hint: What to avoid in the result
    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random"
