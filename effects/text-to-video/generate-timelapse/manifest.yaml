id: generate-timelapse
name: Nature Timelapse
description: Generate a stunning nature timelapse video from your description.
version: "1.0.0"
author: openeffect-team
effect_type: text_to_video
category: generative
tags: [nature, timelapse, landscape, cinematic]

assets:
  thumbnail: thumbnail.jpg
  preview: preview.mp4
  example:
    output: example_output.mp4

inputs:
  prompt:
    type: text
    required: true
    label: Describe the scene
    placeholder: "Mountain sunrise with clouds rolling through valleys..."
    hint: Describe the landscape, time of day, and atmosphere.
    max_length: 600
    multiline: true
  scene_type:
    type: select
    required: false
    label: Scene type
    default: sunrise
    options:
      - value: sunrise
        label: Sunrise
      - value: clouds
        label: Clouds
      - value: flowers
        label: Flowers
      - value: seasons
        label: Seasons

output:
  aspect_ratios: ["16:9", "9:16", "1:1"]
  default_aspect_ratio: "16:9"
  durations: [3, 5, 10]
  default_duration: 5

generation:
  prompt_template: >
    Nature timelapse of {scene_type} scene. {prompt}
    Smooth time progression, dramatic lighting changes,
    cinematic quality, 4K resolution.
  negative_prompt: >
    static, no motion, low quality, blurry,
    artificial, fake, watermark, text overlay
  supported_models: [fal-ai/wan-2.2, fal-ai/kling-v3]
  default_model: fal-ai/wan-2.2
  parameters:
    guidance_scale: 7.5
    num_inference_steps: 30
  advanced_parameters:
    - key: guidance_scale
      label: Guidance scale
      type: slider
      min: 1.0
      max: 20.0
      step: 0.5
      default: 7.5
      hint: Higher = closer to prompt
    - key: num_inference_steps
      label: Quality steps
      type: slider
      min: 10
      max: 50
      step: 5
      default: 30
      hint: More steps = better quality but slower
    - key: negative_prompt
      label: Negative prompt
      type: text
      multiline: true
      default: "static, no motion, low quality, blurry"
      hint: What to avoid in the result
    - key: seed
      label: Seed
      type: number
      default: -1
      hint: "-1 = random"
