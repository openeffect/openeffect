id: openeffect/set-on-fire
name: Set On Fire
description: >
  Controlled cinematic flames ignite around the subject, creating a dramatic
  fire effect while preserving identity, pose, and scene continuity.

version: "0.1.0"
author: openeffect-team
category: transform

tags:
  - trending
  - cinematic
  - fire
  - dramatic
  - transformation
  - viral

assets:
  preview: preview.mp4
  inputs:
    image: input-image.jpg

inputs:
  image:
    type: image
    role: start_frame
    required: true
    label: "Your photo"
    hint: "Works best with clear full-body or medium shots where the silhouette is visible"

  scene_prompt:
    type: text
    required: false
    label: "Describe the scene"
    placeholder: "A stylish man standing in a dark city street at night"
    max_length: 500
    multiline: false

generation:
  models:
    - kling-3.0
    - wan-2.7

  default_model: kling-3.0

  prompt: >
    A single continuous shot of the same subject from the input image.
    Controlled cinematic flames ignite around the subject and along the edges
    of the clothing, gradually surrounding the body with dramatic fire.
    Preserve the same identity, face, hairstyle, clothing shape, pose,
    and background.
    The subject remains planted in the same scene.
    Only subtle natural micro-motion is allowed.
    The effect should feel cinematic and controlled, not chaotic destruction.
    No cut, no scene replacement, no duplicate subject.
    {{ scene_prompt }}

  negative_prompt: >
    cut, scene replacement, duplicate subject, extra people, warped face,
    deformed anatomy, body melting, charred skeleton, gore, horror burning,
    destructive explosion, smoke covering face, full body disintegration,
    clothes disappearing completely, heavy blur, heavy jitter, text, watermark

  model_overrides:
    kling-3.0:
      prompt: >
        Medium shot or full-body shot of the same subject from the input image.
        Controlled cinematic flames ignite around the subject in one continuous shot,
        rising around the body and clothing edges with dramatic but elegant intensity.
        The fire should feel visually powerful yet clean and stylized,
        not gory, not horror, and not like the body is being destroyed.
        Preserve the same subject, face, outfit silhouette, pose, and scene.
        The subject remains planted and recognizable throughout.
        Only subtle blink, breathing, or slight body tension is allowed.
        Clean continuity, no cut, no scene replacement.
        {{ scene_prompt }}
      params:
        duration: 4
        generate_audio: false
        guidance_scale: 0.57

    wan-2.7:
      prompt: >
        Continue from the input image in a single continuous shot.
        Dramatic flames ignite around the same subject and along the outline
        of the clothing and body.
        Keep the same identity, face, outfit, pose, and scene.
        The subject stays planted with only subtle natural micro-motion.
        The fire should look cinematic and readable,
        not like the subject is melting or collapsing.
        No cut, no scene replacement, no duplicate subject.
        {{ scene_prompt }}
      params:
        duration: 4
